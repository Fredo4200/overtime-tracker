<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demetri — Overtime Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #191919;
    --surface2: #222222;
    --border: #2e2e2e;
    --border-light: #3a3a3a;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #d4ff5e;
    --accent-dim: #a8cc48;
    --accent-bg: rgba(212,255,94,0.08);
    --danger: #ff5e5e;
    --success: #5effa0;
    --info: #5eb8ff;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  /* ── Header ── */
  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
  .header h1 { font-size: 26px; font-weight: 300; color: var(--text); letter-spacing: -0.02em; }
  .header h1 strong { font-weight: 500; }

  /* ── Auth bar ── */
  #auth-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 13px; }
  .auth-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.3s; }
  .auth-dot.connected { background: var(--success); }
  .auth-dot.connecting { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #auth-status { color: var(--text-muted); flex: 1; }
  #auth-status strong { color: var(--text); }
  .btn-sm { font-family: var(--sans); font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-light); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { background: var(--surface2); color: var(--text); border-color: var(--border-light); }
  .btn-sm.primary { border-color: var(--accent); color: var(--accent); }
  .btn-sm.primary:hover { background: var(--accent-bg); }
  .btn-sm.danger { border-color: var(--danger); color: var(--danger); }

  /* ── Sheet ID input ── */
  #sheet-config { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 1.5rem; }
  #sheet-config label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  #sheet-config input { width: 100%; background: var(--bg); border: 0.5px solid var(--border-light); border-radius: var(--radius-sm); padding: 8px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; }
  #sheet-config input:focus { outline: none; border-color: var(--accent); }
  #sheet-config .hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  #sheet-config .hint a { color: var(--info); text-decoration: none; }

  /* ── Form card ── */
  .form-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .form-card .card-label { font-size: 11px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--mono); margin-bottom: 1.2rem; }

  .field-grid { display: grid; gap: 12px; margin-bottom: 12px; }
  .col-2 { grid-template-columns: 1fr 1fr; }
  .col-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .col-3 { grid-template-columns: 1fr 1fr 1fr; }

  fieldset { border: none; }
  .field label { display: block; font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 5px; }
  .field label .req { color: var(--accent); }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text);
    font-family: var(--sans); font-size: 13px; transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field textarea { min-height: 64px; resize: vertical; }
  .field input[type="date"]::-webkit-calendar-picker-indicator,
  .field input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
  .btn { font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 9px 20px; border-radius: var(--radius-sm); border: 0.5px solid; cursor: pointer; transition: all 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn-add { border-color: var(--accent); color: var(--accent); background: transparent; }
  .btn-add:hover { background: var(--accent-bg); }
  .btn-submit { border-color: var(--success); color: var(--success); background: transparent; }
  .btn-submit:hover { background: rgba(94,255,160,0.08); }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-clear { border-color: var(--border-light); color: var(--text-muted); background: transparent; }
  .btn-clear:hover { background: var(--surface2); color: var(--text); }
  .err-msg { font-size: 12px; color: var(--danger); }

  /* ── Queue ── */
  .queue-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .queue-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .queue-header .card-label { margin-bottom: 0; }
  .badge { font-family: var(--mono); font-size: 10px; background: var(--accent-bg); color: var(--accent); border: 0.5px solid var(--accent); border-radius: 20px; padding: 2px 8px; }
  .entry-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 10px 0; border-top: 0.5px solid var(--border); }
  .entry-item:first-of-type { border-top: none; }
  .entry-meta { flex: 1; min-width: 0; }
  .entry-line1 { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-line2 { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .entry-sheet { font-size: 10px; background: var(--surface2); border: 0.5px solid var(--border-light); color: var(--text-dim); border-radius: 4px; padding: 1px 6px; margin-left: 6px; font-family: var(--mono); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--danger); }

  /* ── Log ── */
  .log { margin-top: 1rem; }
  .log-item { font-family: var(--mono); font-size: 11px; padding: 6px 0; border-top: 0.5px solid var(--border); color: var(--text-muted); }
  .log-item.ok { color: var(--success); }
  .log-item.err { color: var(--danger); }
  .log-item .ts { color: var(--text-dim); margin-right: 8px; }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 12px; height: 12px; border: 1.5px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 560px) {
    .col-4 { grid-template-columns: 1fr 1fr; }
    .col-3 { grid-template-columns: 1fr 1fr; }
    .col-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <span class="logo">Overtime Tracker</span>
    </div>
    <h1>Demetri's <strong>Timesheet</strong></h1>
  </div>

  <!-- Auth bar -->
  <div id="auth-bar">
    <div class="auth-dot" id="auth-dot"></div>
    <span id="auth-status">Not signed in</span>
    <button class="btn-sm primary" id="auth-btn" onclick="handleAuth()">Sign in with Google</button>
  </div>

  <!-- Sheet ID -->
  <div id="sheet-config">
    <label>Google Spreadsheet ID</label>
    <input type="text" id="sheet-id" placeholder="Paste your Spreadsheet ID here..." oninput="saveSheetId()">
    <p class="hint">
      From your sheet URL: docs.google.com/spreadsheets/d/<strong style="color:var(--info)">THIS_PART</strong>/edit
      &nbsp;·&nbsp; <a href="https://docs.google.com/spreadsheets/create" target="_blank">Create new sheet ↗</a>
    </p>
  </div>

  <!-- Entry form -->
  <div class="form-card">
    <div class="card-label">New entry</div>
    <div class="field-grid col-2">
      <div class="field"><label>Date <span class="req">*</span></label><input type="date" id="f-date"></div>
      <div class="field"><label>Company <span class="req">*</span></label><input type="text" id="f-company" placeholder="e.g. Wedgewood - Balito"></div>
    </div>
    <div class="field-grid col-4">
      <div class="field"><label>Time started <span class="req">*</span></label><input type="time" id="f-start"></div>
      <div class="field"><label>Time ended <span class="req">*</span></label><input type="time" id="f-end"></div>
      <div class="field"><label>From</label><input type="text" id="f-from" placeholder="Origin"></div>
      <div class="field"><label>To</label><input type="text" id="f-to" placeholder="Destination"></div>
    </div>
    <div class="field-grid col-3">
      <div class="field"><label>KM</label><input type="number" id="f-km" placeholder="0" min="0"></div>
      <div class="field"><label>Entrance</label><input type="text" id="f-entrance"></div>
      <div class="field"><label>Return trip</label><input type="text" id="f-return" placeholder="Yes / No"></div>
    </div>
    <div class="field-grid">
      <div class="field"><label>Action / Description <span class="req">*</span></label><textarea id="f-action" placeholder="What was done during this session..."></textarea></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-add" onclick="addToQueue()">+ Queue entry</button>
      <button class="btn btn-submit" id="submit-btn" onclick="submitAll()" disabled>Submit all to Google Sheets</button>
      <span class="err-msg" id="form-err"></span>
    </div>
  </div>

  <!-- Queue -->
  <div id="queue-card" class="queue-card" style="display:none">
    <div class="queue-header">
      <span class="card-label">Queued</span>
      <span class="badge" id="queue-badge">0</span>
    </div>
    <div id="queue-list"></div>
    <div class="btn-row" style="margin-top:12px;border-top:0.5px solid var(--border);padding-top:12px">
      <button class="btn btn-submit" id="submit-btn2" onclick="submitAll()" disabled>Submit all to Google Sheets</button>
      <button class="btn btn-clear" onclick="clearQueue()">Clear queue</button>
    </div>
  </div>

  <!-- Log -->
  <div id="log" class="log" style="display:none">
    <div id="log-items"></div>
  </div>

</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────
// REPLACE THIS with your OAuth Client ID from Google Cloud Console
const GOOGLE_CLIENT_ID = '238734593086-a5rgnau3fc4b772avqloc1nhfube4k0u.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

// ── STATE ────────────────────────────────────────────────────
let tokenClient = null;
let accessToken = null;
let queue = [];

// ── INIT ─────────────────────────────────────────────────────
window.onload = () => {
  // Restore sheet ID
  const saved = localStorage.getItem('ot_sheet_id');
  if (saved) document.getElementById('sheet-id').value = saved;
  // Set today's date
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  // Init Google auth
  initAuth();
};

function initAuth() {
  if (typeof google === 'undefined') {
    setTimeout(initAuth, 300);
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) { setAuthState('error', resp.error); return; }
      accessToken = resp.access_token;
      setAuthState('connected');
    }
  });
}

function handleAuth() {
  if (accessToken) {
    // Sign out
    google.accounts.oauth2.revoke(accessToken, () => {});
    accessToken = null;
    setAuthState('disconnected');
    return;
  }
  setAuthState('connecting');
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function setAuthState(state, msg) {
  const dot = document.getElementById('auth-dot');
  const status = document.getElementById('auth-status');
  const btn = document.getElementById('auth-btn');
  dot.className = 'auth-dot';
  if (state === 'connected') {
    dot.classList.add('connected');
    status.innerHTML = '<strong>Signed in</strong> — ready to write to Google Sheets';
    btn.textContent = 'Sign out';
    btn.className = 'btn-sm danger';
    updateSubmitBtns();
  } else if (state === 'connecting') {
    dot.classList.add('connecting');
    status.textContent = 'Signing in…';
    btn.textContent = 'Cancel';
  } else if (state === 'disconnected') {
    status.textContent = 'Not signed in';
    btn.textContent = 'Sign in with Google';
    btn.className = 'btn-sm primary';
    updateSubmitBtns();
  } else if (state === 'error') {
    status.innerHTML = '<span style="color:var(--danger)">Auth error: ' + (msg||'unknown') + '</span>';
    btn.textContent = 'Try again';
    btn.className = 'btn-sm primary';
  }
}

// ── SHEET ID ─────────────────────────────────────────────────
function saveSheetId() {
  localStorage.setItem('ot_sheet_id', document.getElementById('sheet-id').value.trim());
  updateSubmitBtns();
}

function getSheetId() {
  return document.getElementById('sheet-id').value.trim();
}

// ── FORM ─────────────────────────────────────────────────────
function fv(id) { return document.getElementById(id).value.trim(); }

function addToQueue() {
  const date = fv('f-date'), company = fv('f-company'), start = fv('f-start'), end = fv('f-end'), action = fv('f-action');
  const err = document.getElementById('form-err');
  if (!date || !company || !start || !end || !action) {
    err.textContent = 'Fill in the required fields (*)';
    return;
  }
  err.textContent = '';
  queue.push({ date, company, from: fv('f-from'), to: fv('f-to'), km: fv('f-km'), entrance: fv('f-entrance'), return_trip: fv('f-return'), time_started: start, time_ended: end, action });
  ['f-company','f-from','f-to','f-km','f-entrance','f-return','f-start','f-end','f-action'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  renderQueue();
}

function delFromQueue(i) { queue.splice(i, 1); renderQueue(); }
function clearQueue() { queue = []; renderQueue(); }

function renderQueue() {
  const card = document.getElementById('queue-card');
  const list = document.getElementById('queue-list');
  card.style.display = queue.length ? 'block' : 'none';
  document.getElementById('queue-badge').textContent = queue.length;
  list.innerHTML = queue.map((e, i) => `
    <div class="entry-item">
      <div class="entry-meta">
        <div class="entry-line1">${e.company}<span class="entry-sheet">${sheetName(e.date)}</span></div>
        <div class="entry-line2">${e.date} &nbsp;·&nbsp; ${e.time_started} → ${e.time_ended} &nbsp;·&nbsp; ${e.action.slice(0,70)}${e.action.length>70?'…':''}</div>
      </div>
      <button class="del-btn" onclick="delFromQueue(${i})">✕</button>
    </div>`).join('');
  updateSubmitBtns();
}

function updateSubmitBtns() {
  const ready = !!accessToken && !!getSheetId() && queue.length > 0;
  document.getElementById('submit-btn').disabled = !ready;
  const s2 = document.getElementById('submit-btn2');
  if (s2) s2.disabled = !ready;
}

// ── SHEET HELPERS ────────────────────────────────────────────
function sheetName(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()] + ' ' + d.getFullYear();
}

function timePeriod(s, e) {
  const sm = toMins(s), em = toMins(e);
  let diff = em - sm; if (diff < 0) diff += 1440;
  return Math.floor(diff/60) + ' hours ' + (diff%60) + ' minutes';
}

function toMins(hhmm) {
  const [h,m] = hhmm.split(':').map(Number);
  return h*60+m;
}

// ── GOOGLE SHEETS API ────────────────────────────────────────
async function sheetsRequest(method, path, body) {
  const res = await fetch('https://sheets.googleapis.com/v4/spreadsheets' + path, {
    method,
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || res.status);
  return data;
}

async function getSheetsList(spreadsheetId) {
  const data = await sheetsRequest('GET', '/' + spreadsheetId + '?fields=sheets.properties');
  return data.sheets.map(s => s.properties.title);
}

async function createSheet(spreadsheetId, title) {
  await sheetsRequest('POST', '/' + spreadsheetId + ':batchUpdate', {
    requests: [{ addSheet: { properties: { title } } }]
  });
  // Write headers
  const headers = [['Date','From','To','KM','Company','Entrance','Return Trip','Time Period','Time Started','Time Ended','Action']];
  await sheetsRequest('PUT', `/${spreadsheetId}/values/${encodeURIComponent(title + '!A1:K1')}?valueInputOption=USER_ENTERED`, {
    range: title + '!A1:K1', majorDimension: 'ROWS', values: headers
  });
  log(`Created new sheet: ${title}`, 'ok');
}

async function getNextRow(spreadsheetId, sheetTitle) {
  try {
    const data = await sheetsRequest('GET', `/${spreadsheetId}/values/${encodeURIComponent(sheetTitle + '!A:A')}`);
    const vals = data.values || [];
    return vals.length + 1;
  } catch { return 2; }
}

async function appendEntryToSheet(spreadsheetId, entry) {
  const sn = sheetName(entry.date);
  const sheets = await getSheetsList(spreadsheetId);
  if (!sheets.includes(sn)) await createSheet(spreadsheetId, sn);

  const row = await getNextRow(spreadsheetId, sn);
  const tp = timePeriod(entry.time_started, entry.time_ended);
  const values = [[
    entry.date, entry.from||'', entry.to||'', entry.km||'',
    entry.company, entry.entrance||'', entry.return_trip||'',
    tp, entry.time_started, entry.time_ended, entry.action
  ]];
  const range = `${sn}!A${row}:K${row}`;
  await sheetsRequest('PUT', `/${spreadsheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`, {
    range, majorDimension: 'ROWS', values
  });
}

// ── SUBMIT ───────────────────────────────────────────────────
async function submitAll() {
  const sheetId = getSheetId();
  if (!sheetId || !accessToken || !queue.length) return;

  const btn = document.getElementById('submit-btn');
  const btn2 = document.getElementById('submit-btn2');
  const origText = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>Submitting…';
  btn.disabled = true; btn2.disabled = true;

  showLog();
  let ok = 0, fail = 0;

  for (const entry of queue) {
    try {
      await appendEntryToSheet(sheetId, entry);
      log(`✓ ${entry.date} — ${entry.company} (${timePeriod(entry.time_started, entry.time_ended)})`, 'ok');
      ok++;
    } catch (e) {
      log(`✗ ${entry.date} — ${entry.company}: ${e.message}`, 'err');
      fail++;
    }
  }

  log(`Done — ${ok} written, ${fail} failed`, fail > 0 ? 'err' : 'ok');
  btn.textContent = origText;
  if (fail === 0) { queue = []; renderQueue(); }
  updateSubmitBtns();
}

// ── LOG ───────────────────────────────────────────────────────
function showLog() { document.getElementById('log').style.display = 'block'; }

function log(msg, type) {
  const now = new Date().toTimeString().slice(0, 8);
  const el = document.createElement('div');
  el.className = 'log-item' + (type ? ' ' + type : '');
  el.innerHTML = `<span class="ts">${now}</span>${msg}`;
  const items = document.getElementById('log-items');
  items.prepend(el);
}
</script>
</body>
</html>
